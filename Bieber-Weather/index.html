<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bieber Weather</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple-deep: #6a0dad;
      --purple-mid:  #9b59b6;
      --purple-light:#c39bd3;
      --gold:        #f1c40f;
      --gold-dim:    #d4ac0d;
      --bg:          #1a1a2e;
      --bg2:         #16213e;
      --bg3:         #0f3460;
      --text:        #e8e8f0;
      --text-dim:    #a0a0b8;
      --card-bg:     rgba(26, 26, 46, 0.85);
      --glow:        0 0 18px rgba(155, 89, 182, 0.45);
      --glow-gold:   0 0 18px rgba(241, 193, 15, 0.4);
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
      transition: background 1.2s ease;
    }

    /* ── WEATHER CANVAS BACKGROUND ── */
    #weather-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    body > * { position: relative; z-index: 1; }

    /* ── BASE BG (default stars) ── */
    body.wx-default {
      background: radial-gradient(ellipse at 20% 20%, rgba(106,13,173,0.25) 0%, transparent 55%),
                  radial-gradient(ellipse at 80% 80%, rgba(15,52,96,0.4) 0%, transparent 55%),
                  #1a1a2e;
    }
    body.wx-clear {
      background: linear-gradient(160deg, #0d1b2a 0%, #1a1a4e 40%, #2d1b69 100%);
    }
    body.wx-clouds {
      background: linear-gradient(160deg, #1a1a2e 0%, #2c2c4a 50%, #3a3a5c 100%);
    }
    body.wx-rain {
      background: linear-gradient(160deg, #0a0e1a 0%, #0d1b35 50%, #0a2040 100%);
    }
    body.wx-storm {
      background: linear-gradient(160deg, #0a0a0a 0%, #1a0a2e 50%, #0d0d1a 100%);
    }
    body.wx-snow {
      background: linear-gradient(160deg, #1a2030 0%, #1e2840 50%, #2a3050 100%);
    }
    body.wx-fog {
      background: linear-gradient(160deg, #1e1e28 0%, #2a2a3a 50%, #1e2030 100%);
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      padding: 2.5rem 1rem 1.5rem;
      position: relative;
    }

    header::after {
      content: '';
      display: block;
      width: 120px;
      height: 3px;
      background: linear-gradient(90deg, var(--purple-deep), var(--gold), var(--purple-deep));
      margin: 1rem auto 0;
      border-radius: 2px;
      box-shadow: var(--glow-gold);
    }

    .site-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 6vw, 3.8rem);
      font-weight: 900;
      background: linear-gradient(135deg, var(--gold) 0%, var(--purple-light) 60%, var(--gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .site-tagline {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: var(--purple-light);
      font-size: 1rem;
      margin-top: 0.4rem;
      opacity: 0.85;
      min-height: 1.5em;
      transition: opacity 0.4s;
    }

    /* ── MAIN CONTAINER ── */
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 1rem 3rem;
    }

    /* ── SEARCH SECTION ── */
    .search-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      margin: 2rem 0;
    }

    .search-wrapper {
      position: relative;
      width: 100%;
      max-width: 520px;
    }

    .search-row {
      display: flex;
      gap: 0.6rem;
      width: 100%;
    }

    #city-input {
      flex: 1;
      padding: 0.75rem 1.1rem;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(155, 89, 182, 0.4);
      border-radius: 50px;
      color: var(--text);
      font-family: 'Poppins', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #city-input::placeholder { color: var(--text-dim); }
    #city-input:focus {
      border-color: var(--purple-mid);
      box-shadow: var(--glow);
    }

    /* ── AUTOCOMPLETE DROPDOWN ── */
    #autocomplete-list {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: #1e1e38;
      border: 1px solid rgba(155,89,182,0.45);
      border-radius: 14px;
      overflow: hidden;
      z-index: 100;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5), var(--glow);
    }

    .autocomplete-item {
      padding: 0.65rem 1.1rem;
      cursor: pointer;
      font-size: 0.88rem;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: background 0.15s;
      border-bottom: 1px solid rgba(155,89,182,0.1);
    }

    .autocomplete-item:last-child { border-bottom: none; }

    .autocomplete-item:hover,
    .autocomplete-item.active {
      background: rgba(155,89,182,0.2);
    }

    .autocomplete-flag {
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .autocomplete-name {
      flex: 1;
      font-weight: 500;
    }

    .autocomplete-sub {
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    #search-btn {
      padding: 0.75rem 1.4rem;
      background: linear-gradient(135deg, var(--purple-deep), var(--purple-mid));
      border: none;
      border-radius: 50px;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      white-space: nowrap;
      transition: transform 0.15s, box-shadow 0.2s;
      box-shadow: var(--glow);
    }

    #search-btn:hover { transform: translateY(-1px); box-shadow: 0 0 26px rgba(155,89,182,0.65); }
    #search-btn:active { transform: translateY(0); }

    /* ── UNIT TOGGLE ── */
    .unit-toggle {
      display: flex;
      gap: 0;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(155,89,182,0.35);
      border-radius: 50px;
      overflow: hidden;
    }

    .unit-toggle label {
      padding: 0.45rem 1.1rem;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-dim);
      transition: background 0.2s, color 0.2s;
      user-select: none;
    }

    .unit-toggle input[type="radio"] { display: none; }

    .unit-toggle input[type="radio"]:checked + label {
      background: linear-gradient(135deg, var(--purple-deep), var(--purple-mid));
      color: #fff;
    }

    /* ── ERROR ── */
    #error-msg {
      display: none;
      text-align: center;
      color: var(--gold);
      background: rgba(241,193,15,0.1);
      border: 1px solid rgba(241,193,15,0.3);
      border-radius: 12px;
      padding: 0.8rem 1.4rem;
      font-size: 0.9rem;
      max-width: 520px;
      margin: 0 auto;
    }

    /* ── CARDS SHARED ── */
    .card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(155,89,182,0.3);
      border-radius: 20px;
      padding: 1.6rem;
      box-shadow: var(--glow);
      transition: box-shadow 0.3s, opacity 0.4s, transform 0.4s;
    }

    .card:hover { box-shadow: 0 0 28px rgba(155,89,182,0.55); }

    .card.fade-in {
      animation: fadeUp 0.5s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .section-heading {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 1.1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .section-heading::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 1.1em;
      background: var(--gold);
      border-radius: 2px;
      box-shadow: var(--glow-gold);
    }

    /* ── CURRENT WEATHER ── */
    #weather-section { display: none; margin-bottom: 1.5rem; }

    .weather-main {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .weather-icon-wrap img {
      width: 80px;
      height: 80px;
      filter: drop-shadow(0 0 10px rgba(241,193,15,0.5));
    }

    .weather-info { flex: 1; min-width: 160px; }

    .city-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text);
    }

    .weather-desc {
      color: var(--purple-light);
      font-size: 0.95rem;
      margin-top: 0.15rem;
      font-style: italic;
    }

    .temp-display {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      font-weight: 900;
      color: var(--gold);
      line-height: 1;
      margin: 0.4rem 0;
      text-shadow: var(--glow-gold);
    }

    .weather-meta {
      display: flex;
      gap: 1.2rem;
      flex-wrap: wrap;
      margin-top: 1.2rem;
      padding-top: 1.2rem;
      border-top: 1px solid rgba(155,89,182,0.2);
    }

    .meta-item {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .meta-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
    }

    .meta-value {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }

    /* ── UV INDEX BAR ── */
    .uv-bar-wrap {
      margin-top: 0.3rem;
      width: 100%;
      max-width: 200px;
    }

    .uv-bar-track {
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(90deg, #2ecc71, #f1c40f, #e67e22, #e74c3c, #8e44ad);
      position: relative;
      margin-top: 0.25rem;
    }

    .uv-bar-thumb {
      width: 12px;
      height: 12px;
      background: #fff;
      border-radius: 50%;
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 6px rgba(0,0,0,0.5);
      transition: left 0.4s ease;
    }

    /* ── FORECAST ── */
    #forecast-section { display: none; margin-bottom: 1.5rem; }

    .forecast-row {
      display: flex;
      gap: 0.8rem;
      overflow-x: auto;
      padding-bottom: 0.4rem;
    }

    .forecast-row::-webkit-scrollbar { height: 4px; }
    .forecast-row::-webkit-scrollbar-thumb { background: var(--purple-mid); border-radius: 2px; }

    .forecast-card {
      flex: 0 0 auto;
      min-width: 110px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(155,89,182,0.25);
      border-radius: 14px;
      padding: 0.9rem 0.7rem;
      text-align: center;
      transition: border-color 0.2s, background 0.2s;
    }

    .forecast-card:hover {
      border-color: var(--purple-mid);
      background: rgba(155,89,182,0.12);
    }

    .forecast-day {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--gold);
      margin-bottom: 0.4rem;
    }

    .forecast-card img {
      width: 48px;
      height: 48px;
      filter: drop-shadow(0 0 6px rgba(241,193,15,0.35));
    }

    .forecast-temp {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      margin-top: 0.25rem;
    }

    .forecast-desc {
      font-size: 0.7rem;
      color: var(--text-dim);
      margin-top: 0.2rem;
      line-height: 1.3;
    }

    /* ── AQI ── */
    #aqi-section { display: none; }

    .aqi-body { display: flex; flex-direction: column; gap: 1rem; }

    .aqi-badge-row { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }

    .aqi-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1.1rem;
      border-radius: 50px;
      font-weight: 700;
      font-size: 1rem;
      color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.4);
    }

    .aqi-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(255,255,255,0.6);
      flex-shrink: 0;
    }

    .aqi-desc { font-size: 0.85rem; color: var(--text-dim); }

    .pollutants {
      display: flex;
      gap: 1.2rem;
      flex-wrap: wrap;
    }

    .pollutant-item {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.75rem;
      color: var(--text-dim);
      opacity: 0.6;
    }

    footer a { color: var(--purple-light); text-decoration: none; }

    /* ── LOADING SPINNER ── */
    .spinner {
      display: none;
      width: 28px;
      height: 28px;
      border: 3px solid rgba(155,89,182,0.2);
      border-top-color: var(--purple-mid);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 1rem auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 500px) {
      .weather-meta { gap: 0.8rem; }
      .temp-display { font-size: 2.4rem; }
    }
  </style>
</head>
<body class="wx-default">

  <canvas id="weather-canvas"></canvas>

  <header>
    <h1 class="site-title">Bieber Weather</h1>
    <p class="site-tagline" id="tagline"></p>
  </header>

  <main>

    <section class="search-section">
      <div class="search-wrapper">
        <div class="search-row">
          <input type="text" id="city-input" placeholder="Enter a city (e.g. Omaha, London...)" autocomplete="off" />
          <button id="search-btn">Get Weather</button>
        </div>
        <div id="autocomplete-list"></div>
      </div>

      <div class="unit-toggle">
        <input type="radio" name="unit" id="unit-c" value="C" checked />
        <label for="unit-c">°C</label>
        <input type="radio" name="unit" id="unit-f" value="F" />
        <label for="unit-f">°F</label>
      </div>

      <div id="error-msg"></div>
      <div class="spinner" id="spinner"></div>
    </section>

    <!-- Current Weather -->
    <section id="weather-section">
      <div class="card">
        <div class="section-heading">Current Weather</div>
        <div class="weather-main">
          <div class="weather-icon-wrap">
            <img id="w-icon" src="" alt="weather icon" />
          </div>
          <div class="weather-info">
            <div class="city-name" id="w-city"></div>
            <div class="weather-desc" id="w-desc"></div>
            <div class="temp-display" id="w-temp"></div>
          </div>
        </div>
        <div class="weather-meta">
          <div class="meta-item">
            <span class="meta-label">Feels Like</span>
            <span class="meta-value" id="w-feels"></span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Humidity</span>
            <span class="meta-value" id="w-humidity"></span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Wind</span>
            <span class="meta-value" id="w-wind"></span>
          </div>
          <div class="meta-item">
            <span class="meta-label">UV Index</span>
            <span class="meta-value" id="w-uv">--</span>
            <div class="uv-bar-wrap">
              <div class="uv-bar-track">
                <div class="uv-bar-thumb" id="uv-thumb" style="left:0%"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Forecast -->
    <section id="forecast-section">
      <div class="card">
        <div class="section-heading">5-Day Forecast</div>
        <div class="forecast-row" id="forecast-row"></div>
      </div>
    </section>

    <!-- AQI -->
    <section id="aqi-section">
      <div class="card">
        <div class="section-heading">Air Quality</div>
        <div class="aqi-body">
          <div class="aqi-badge-row">
            <div class="aqi-pill" id="aqi-pill">
              <span class="aqi-dot"></span>
              <span id="aqi-label">--</span>
            </div>
            <span class="aqi-desc" id="aqi-desc"></span>
          </div>
          <div class="pollutants">
            <div class="pollutant-item">
              <span class="meta-label">PM2.5</span>
              <span class="meta-value" id="aqi-pm25">--</span>
            </div>
            <div class="pollutant-item">
              <span class="meta-label">PM10</span>
              <span class="meta-value" id="aqi-pm10">--</span>
            </div>
            <div class="pollutant-item">
              <span class="meta-label">CO</span>
              <span class="meta-value" id="aqi-co">--</span>
            </div>
          </div>
        </div>
      </div>
    </section>

  </main>

  <footer>Powered by <a href="https://openweathermap.org" target="_blank">OpenWeatherMap</a> &nbsp;|&nbsp; Bieber Weather &copy; 2026</footer>

  <script>
    const API_KEY = '42e5cca0cb1c0b4d3ce08e549487bf3b';
    let currentWeatherData = null;
    let selectedCoords = null; // from autocomplete selection {lat, lon, name, country, state}
    let autocompleteIndex = -1;
    let debounceTimer = null;
    let canvasAnim = null;

    // ── RANDOM BIEBER LYRIC TAGLINE ──
    const LYRICS = [
      '"Baby, baby, baby... what\'s the weather?"',
      '"Is it too late now to check the forecast?"',
      '"One less lonely cloud..."',
      '"What do you mean... it\'s raining?"',
      '"Love yourself... and bring an umbrella."',
      '"Sorry, I didn\'t check the weather."',
      '"Never say never — unless it\'s a blizzard."',
      '"Somebody to love... and share a forecast with."',
      '"Hold on, the storm will pass."',
      '"Intentions: partly cloudy with a chance of gold."',
    ];
    document.getElementById('tagline').textContent = LYRICS[Math.floor(Math.random() * LYRICS.length)];

    // ── AQI META ──
    const AQI_META = {
      1: { label: 'Good',      color: '#2ecc71', desc: 'Air quality is satisfactory.' },
      2: { label: 'Fair',      color: '#f1c40f', desc: 'Acceptable air quality.' },
      3: { label: 'Moderate',  color: '#e67e22', desc: 'Sensitive groups may be affected.' },
      4: { label: 'Poor',      color: '#e74c3c', desc: 'Health effects possible for everyone.' },
      5: { label: 'Very Poor', color: '#8e44ad', desc: 'Health warnings of emergency conditions.' },
    };

    // ── UV META ──
    const UV_LABELS = [
      { max: 3,  label: 'Low',       color: '#2ecc71' },
      { max: 6,  label: 'Moderate',  color: '#f1c40f' },
      { max: 8,  label: 'High',      color: '#e67e22' },
      { max: 11, label: 'Very High', color: '#e74c3c' },
      { max: 99, label: 'Extreme',   color: '#8e44ad' },
    ];

    function uvMeta(val) {
      return UV_LABELS.find(u => val <= u.max) || UV_LABELS[UV_LABELS.length - 1];
    }

    // ── WEATHER CONDITION → CSS CLASS MAP ──
    function wxClass(code) {
      if (code >= 200 && code < 300) return 'wx-storm';
      if (code >= 300 && code < 600) return 'wx-rain';
      if (code >= 600 && code < 700) return 'wx-snow';
      if (code >= 700 && code < 800) return 'wx-fog';
      if (code === 800)              return 'wx-clear';
      if (code > 800)                return 'wx-clouds';
      return 'wx-default';
    }

    // ── CANVAS WEATHER ANIMATIONS ──
    const canvas = document.getElementById('weather-canvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    function stopCanvas() {
      if (canvasAnim) { cancelAnimationFrame(canvasAnim); canvasAnim = null; }
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    // Stars (default / clear)
    function makeStars(n) {
      return Array.from({ length: n }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.5 + 0.3,
        a: Math.random(),
        speed: Math.random() * 0.005 + 0.002,
        phase: Math.random() * Math.PI * 2,
      }));
    }

    function animateStars(stars) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const t = performance.now() / 1000;
      stars.forEach(s => {
        const alpha = 0.4 + 0.6 * Math.abs(Math.sin(t * s.speed * 10 + s.phase));
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${alpha * 0.8})`;
        ctx.fill();
      });
      canvasAnim = requestAnimationFrame(() => animateStars(stars));
    }

    // Rain
    function makeDrops(n) {
      return Array.from({ length: n }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        len: Math.random() * 18 + 8,
        speed: Math.random() * 6 + 8,
        alpha: Math.random() * 0.3 + 0.1,
      }));
    }

    function animateRain(drops) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = 'rgba(130,180,255,0.35)';
      ctx.lineWidth = 1;
      drops.forEach(d => {
        ctx.beginPath();
        ctx.moveTo(d.x, d.y);
        ctx.lineTo(d.x - 1, d.y + d.len);
        ctx.stroke();
        d.y += d.speed;
        if (d.y > canvas.height) {
          d.y = -d.len;
          d.x = Math.random() * canvas.width;
        }
      });
      canvasAnim = requestAnimationFrame(() => animateRain(drops));
    }

    // Snow
    function makeFlakes(n) {
      return Array.from({ length: n }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 3 + 1,
        speed: Math.random() * 1.2 + 0.4,
        drift: (Math.random() - 0.5) * 0.5,
        alpha: Math.random() * 0.5 + 0.3,
      }));
    }

    function animateSnow(flakes) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      flakes.forEach(f => {
        ctx.beginPath();
        ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(220,235,255,${f.alpha})`;
        ctx.fill();
        f.y += f.speed;
        f.x += f.drift;
        if (f.y > canvas.height) { f.y = -f.r; f.x = Math.random() * canvas.width; }
      });
      canvasAnim = requestAnimationFrame(() => animateSnow(flakes));
    }

    // Storm (lightning flashes)
    let stormFlashTimer = 0;
    function animateStorm(stars) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const t = performance.now();
      // background stars dimly
      stars.forEach(s => {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r * 0.6, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(200,200,255,0.2)`;
        ctx.fill();
      });
      // random lightning flash
      if (t - stormFlashTimer > 2500 + Math.random() * 3000) {
        stormFlashTimer = t;
        const x = Math.random() * canvas.width;
        const grad = ctx.createRadialGradient(x, 0, 0, x, 0, canvas.height * 0.7);
        grad.addColorStop(0, 'rgba(200,180,255,0.18)');
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
      canvasAnim = requestAnimationFrame(() => animateStorm(stars));
    }

    // Fog (drifting semi-transparent blobs)
    function makeFogBlobs(n) {
      return Array.from({ length: n }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 160 + 80,
        speed: (Math.random() - 0.5) * 0.3,
        alpha: Math.random() * 0.06 + 0.02,
      }));
    }

    function animateFog(blobs) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      blobs.forEach(b => {
        const grad = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
        grad.addColorStop(0, `rgba(180,180,210,${b.alpha})`);
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fill();
        b.x += b.speed;
        if (b.x > canvas.width + b.r) b.x = -b.r;
        if (b.x < -b.r) b.x = canvas.width + b.r;
      });
      canvasAnim = requestAnimationFrame(() => animateFog(blobs));
    }

    // Cloud (drifting pale circles)
    function makeCloudParticles(n) {
      return Array.from({ length: n }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height * 0.6,
        r: Math.random() * 80 + 40,
        speed: Math.random() * 0.2 + 0.05,
        alpha: Math.random() * 0.05 + 0.02,
      }));
    }

    function animateClouds(particles) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
        grad.addColorStop(0, `rgba(200,200,230,${p.alpha})`);
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
        p.x += p.speed;
        if (p.x - p.r > canvas.width) p.x = -p.r;
      });
      canvasAnim = requestAnimationFrame(() => animateClouds(particles));
    }

    function startWeatherAnimation(cls) {
      stopCanvas();
      if (cls === 'wx-clear' || cls === 'wx-default') {
        animateStars(makeStars(120));
      } else if (cls === 'wx-rain') {
        animateRain(makeDrops(140));
      } else if (cls === 'wx-snow') {
        animateSnow(makeFlakes(100));
      } else if (cls === 'wx-storm') {
        stormFlashTimer = 0;
        animateStorm(makeStars(80));
      } else if (cls === 'wx-fog') {
        animateFog(makeFogBlobs(14));
      } else if (cls === 'wx-clouds') {
        animateClouds(makeCloudParticles(10));
      }
    }

    // default animation on load
    startWeatherAnimation('wx-default');

    // ── HELPERS ──
    function convertTemp(celsius, unit) {
      if (unit === 'F') return (celsius * 9 / 5) + 32;
      return celsius;
    }

    function formatTemp(celsius, unit) {
      return `${Math.round(convertTemp(celsius, unit))}°${unit}`;
    }

    function formatWind(mps, unit) {
      if (unit === 'F') return `${(mps * 2.237).toFixed(1)} mph`;
      return `${mps.toFixed(1)} m/s`;
    }

    function getUnit() {
      return document.querySelector('input[name="unit"]:checked').value;
    }

    function capitalize(str) {
      return str.charAt(0).toUpperCase() + str.slice(1);
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function clearError() {
      const el = document.getElementById('error-msg');
      el.style.display = 'none';
      el.textContent = '';
    }

    function setLoading(on) {
      document.getElementById('spinner').style.display = on ? 'block' : 'none';
      document.getElementById('search-btn').disabled = on;
    }

    function fadeInCard(sectionId) {
      const section = document.getElementById(sectionId);
      const card = section.querySelector('.card');
      section.style.display = 'block';
      card.classList.remove('fade-in');
      void card.offsetWidth; // reflow
      card.classList.add('fade-in');
    }

    // ── DISPLAY FUNCTIONS ──
    function displayWeather(data) {
      const unit = getUnit();
      document.getElementById('w-city').textContent = `${data.name}, ${data.sys.country}`;
      document.getElementById('w-desc').textContent = capitalize(data.weather[0].description);
      document.getElementById('w-icon').src = `https://openweathermap.org/img/wn/${data.weather[0].icon}@2x.png`;
      document.getElementById('w-icon').alt = data.weather[0].description;
      document.getElementById('w-temp').textContent = formatTemp(data.main.temp, unit);
      document.getElementById('w-feels').textContent = formatTemp(data.main.feels_like, unit);
      document.getElementById('w-humidity').textContent = `${data.main.humidity}%`;
      document.getElementById('w-wind').textContent = formatWind(data.wind.speed, unit);

      // Apply reactive background
      const cls = wxClass(data.weather[0].id);
      document.body.className = cls;
      startWeatherAnimation(cls);

      fadeInCard('weather-section');
    }

    function displayUV(uvValue) {
      const meta = uvMeta(uvValue);
      const rounded = Math.round(uvValue * 10) / 10;
      const el = document.getElementById('w-uv');
      el.textContent = `${rounded} — ${meta.label}`;
      el.style.color = meta.color;
      // position thumb: clamp UVI 0–12 to 0–100%
      const pct = Math.min(100, (uvValue / 12) * 100);
      document.getElementById('uv-thumb').style.left = `${pct}%`;
    }

    function displayForecast(data) {
      const unit = getUnit();
      const list = data.list;
      const days = {};
      list.forEach(item => {
        const date = item.dt_txt.split(' ')[0];
        if (!days[date]) {
          days[date] = item;
        } else {
          const curHour = parseInt(days[date].dt_txt.split(' ')[1]);
          const newHour = parseInt(item.dt_txt.split(' ')[1]);
          if (Math.abs(newHour - 12) < Math.abs(curHour - 12)) days[date] = item;
        }
      });

      const today = new Date().toISOString().split('T')[0];
      const futureDays = Object.entries(days).filter(([d]) => d > today).slice(0, 5);

      const row = document.getElementById('forecast-row');
      row.innerHTML = '';

      futureDays.forEach(([date, item]) => {
        const dayName = new Date(date + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long' });
        const card = document.createElement('div');
        card.className = 'forecast-card';
        card._celsius = item.main.temp;
        card.innerHTML = `
          <div class="forecast-day">${dayName}</div>
          <img src="https://openweathermap.org/img/wn/${item.weather[0].icon}@2x.png" alt="${item.weather[0].description}" />
          <div class="forecast-temp">${formatTemp(item.main.temp, unit)}</div>
          <div class="forecast-desc">${capitalize(item.weather[0].description)}</div>
        `;
        row.appendChild(card);
      });

      fadeInCard('forecast-section');
    }

    function displayAQI(data) {
      const aqi = data.list[0].main.aqi;
      const comp = data.list[0].components;
      const meta = AQI_META[aqi] || { label: 'Unknown', color: '#888', desc: '' };

      const pill = document.getElementById('aqi-pill');
      pill.style.background = meta.color;
      pill.style.boxShadow = `0 0 16px ${meta.color}66`;
      document.getElementById('aqi-label').textContent = meta.label;
      document.getElementById('aqi-desc').textContent = meta.desc;
      document.getElementById('aqi-pm25').textContent = `${comp.pm2_5.toFixed(1)} µg/m³`;
      document.getElementById('aqi-pm10').textContent = `${comp.pm10.toFixed(1)} µg/m³`;
      document.getElementById('aqi-co').textContent = `${comp.co.toFixed(1)} µg/m³`;

      fadeInCard('aqi-section');
    }

    function rerenderUnits() {
      if (!currentWeatherData) return;
      const unit = getUnit();
      const d = currentWeatherData;
      document.getElementById('w-temp').textContent = formatTemp(d.main.temp, unit);
      document.getElementById('w-feels').textContent = formatTemp(d.main.feels_like, unit);
      document.getElementById('w-wind').textContent = formatWind(d.wind.speed, unit);
      document.querySelectorAll('.forecast-card').forEach(card => {
        const tempEl = card.querySelector('.forecast-temp');
        if (tempEl && card._celsius !== undefined) tempEl.textContent = formatTemp(card._celsius, unit);
      });
    }

    // ── AUTOCOMPLETE ──
    function countryFlag(code) {
      if (!code || code.length !== 2) return '🌍';
      return String.fromCodePoint(
        ...[...code.toUpperCase()].map(c => 127397 + c.charCodeAt(0))
      );
    }

    function hideAutocomplete() {
      const list = document.getElementById('autocomplete-list');
      list.style.display = 'none';
      list.innerHTML = '';
      autocompleteIndex = -1;
    }

    async function fetchSuggestions(query) {
      if (query.length < 2) { hideAutocomplete(); return; }
      try {
        const res = await fetch(
          `https://api.openweathermap.org/geo/1.0/direct?q=${encodeURIComponent(query)}&limit=6&appid=${API_KEY}`
        );
        if (!res.ok) return;
        const results = await res.json();
        showSuggestions(results);
      } catch (e) { /* silently ignore */ }
    }

    function showSuggestions(results) {
      const list = document.getElementById('autocomplete-list');
      list.innerHTML = '';
      autocompleteIndex = -1;

      if (!results.length) { list.style.display = 'none'; return; }

      results.forEach((r, i) => {
        const item = document.createElement('div');
        item.className = 'autocomplete-item';
        const sub = [r.state, r.country].filter(Boolean).join(', ');
        item.innerHTML = `
          <span class="autocomplete-flag">${countryFlag(r.country)}</span>
          <span class="autocomplete-name">${r.name}</span>
          <span class="autocomplete-sub">${sub}</span>
        `;
        item.addEventListener('mousedown', e => {
          e.preventDefault();
          selectSuggestion(r);
        });
        list.appendChild(item);
      });

      list.style.display = 'block';
    }

    function selectSuggestion(r) {
      selectedCoords = { lat: r.lat, lon: r.lon, name: r.name, country: r.country, state: r.state };
      const label = [r.name, r.state, r.country].filter(Boolean).join(', ');
      document.getElementById('city-input').value = label;
      hideAutocomplete();
      getWeather();
    }

    function moveAutocompleteSelection(dir) {
      const list = document.getElementById('autocomplete-list');
      const items = list.querySelectorAll('.autocomplete-item');
      if (!items.length) return;
      items[autocompleteIndex]?.classList.remove('active');
      autocompleteIndex = (autocompleteIndex + dir + items.length) % items.length;
      items[autocompleteIndex].classList.add('active');
    }

    // ── MAIN WEATHER FETCH ──
    async function getWeather() {
      const input = document.getElementById('city-input').value.trim();
      if (!input) return;

      clearError();
      hideAutocomplete();
      document.getElementById('weather-section').style.display = 'none';
      document.getElementById('forecast-section').style.display = 'none';
      document.getElementById('aqi-section').style.display = 'none';
      currentWeatherData = null;
      setLoading(true);

      try {
        let weatherRes;

        if (selectedCoords) {
          // Use lat/lon from autocomplete selection
          const { lat, lon } = selectedCoords;
          weatherRes = await fetch(
            `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric`
          );
          selectedCoords = null;
        } else {
          weatherRes = await fetch(
            `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(input)}&appid=${API_KEY}&units=metric`
          );
        }

        if (weatherRes.status === 404) {
          showError("Hmm, couldn't find that city. Try again?");
          setLoading(false);
          return;
        }
        if (!weatherRes.ok) throw new Error('Weather fetch failed');

        const weatherData = await weatherRes.json();
        currentWeatherData = weatherData;
        displayWeather(weatherData);

        const { lat, lon } = weatherData.coord;

        const [forecastRes, aqiRes, uvRes] = await Promise.all([
          fetch(`https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric`),
          fetch(`https://api.openweathermap.org/data/2.5/air_pollution?lat=${lat}&lon=${lon}&appid=${API_KEY}`),
          fetch(`https://api.openweathermap.org/data/2.5/uvi?lat=${lat}&lon=${lon}&appid=${API_KEY}`),
        ]);

        if (forecastRes.ok) displayForecast(await forecastRes.json());
        if (aqiRes.ok)      displayAQI(await aqiRes.json());
        if (uvRes.ok) {
          const uvData = await uvRes.json();
          displayUV(uvData.value);
        }

      } catch (err) {
        showError('Something went wrong. Please try again.');
        console.error(err);
      }

      setLoading(false);
    }

    // ── EVENT LISTENERS ──
    document.getElementById('search-btn').addEventListener('click', () => {
      selectedCoords = null;
      getWeather();
    });

    document.getElementById('city-input').addEventListener('input', e => {
      selectedCoords = null;
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => fetchSuggestions(e.target.value.trim()), 280);
    });

    document.getElementById('city-input').addEventListener('keydown', e => {
      const list = document.getElementById('autocomplete-list');
      const visible = list.style.display === 'block';
      if (e.key === 'ArrowDown' && visible) { e.preventDefault(); moveAutocompleteSelection(1); }
      else if (e.key === 'ArrowUp' && visible) { e.preventDefault(); moveAutocompleteSelection(-1); }
      else if (e.key === 'Enter') {
        if (visible && autocompleteIndex >= 0) {
          e.preventDefault();
          list.querySelectorAll('.autocomplete-item')[autocompleteIndex].dispatchEvent(new MouseEvent('mousedown'));
        } else {
          selectedCoords = null;
          getWeather();
        }
      } else if (e.key === 'Escape') {
        hideAutocomplete();
      }
    });

    document.addEventListener('click', e => {
      if (!document.getElementById('autocomplete-list').contains(e.target) &&
          e.target !== document.getElementById('city-input')) {
        hideAutocomplete();
      }
    });

    document.querySelectorAll('input[name="unit"]').forEach(radio => {
      radio.addEventListener('change', rerenderUnits);
    });
  </script>
</body>
</html>
